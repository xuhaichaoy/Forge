name: macOS release

on:
  workflow_dispatch:
    inputs:
      codex_ref:
        description: "Pinned openai/codex tag or 40-character commit SHA used to build the bundled sidecar"
        required: true
        type: string

permissions:
  contents: read

env:
  FORGE_RELEASE_TARGET: aarch64-apple-darwin

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build signed macOS release
    runs-on: macos-latest
    timeout-minutes: 150

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out Codex source
        uses: actions/checkout@v4
        with:
          repository: openai/codex
          ref: ${{ inputs.codex_ref }}
          path: codex-upstream
          fetch-depth: 0

      - name: Validate pinned Codex source
        env:
          CODEX_REF: ${{ inputs.codex_ref }}
        run: |
          set -euo pipefail
          HEAD_SHA="$(git -C codex-upstream rev-parse HEAD)"
          if [[ "$CODEX_REF" =~ ^[0-9a-f]{40}$ ]]; then
            if [[ "$HEAD_SHA" != "$CODEX_REF" ]]; then
              echo "codex_ref resolved to $HEAD_SHA, expected $CODEX_REF"
              exit 1
            fi
            exit 0
          fi
          if git -C codex-upstream tag --points-at HEAD --list "$CODEX_REF" | grep -qx "$CODEX_REF"; then
            exit 0
          fi
          echo "codex_ref must be a tag name or a full 40-character commit SHA, not a moving branch: $CODEX_REF"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: ${{ env.FORGE_RELEASE_TARGET }}

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            codex-upstream/codex-rs -> codex-upstream/codex-rs/target

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Test root scripts
        run: npm run test:scripts

      - name: Test JavaScript workspaces
        run: npm run test --workspaces --if-present

      - name: Check Rust formatting
        run: npm run format:check

      - name: Lint workspace
        run: npm run lint

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Build desktop web assets
        run: npm run build --workspace @forge/desktop

      - name: Prepare Codex sidecar
        run: npm run sidecar:prepare
        env:
          FORGE_CODEX_SOURCE_DIR: ${{ github.workspace }}/codex-upstream/codex-rs
          FORGE_CODEX_TARGET: ${{ env.FORGE_RELEASE_TARGET }}

      - name: Smoke Codex sidecar
        if: runner.arch == 'ARM64'
        run: npm run sidecar:smoke

      - name: Materialize App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH_SECRET: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_API_KEY_P8:-}" ]]; then
            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY:-forge}.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
            chmod 600 "$key_path"
            echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          elif [[ -n "${APPLE_API_KEY_PATH_SECRET:-}" ]]; then
            echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH_SECRET" >> "$GITHUB_ENV"
          fi

      # GitHub secret/var NAMES deliberately keep the legacy HICODEX_* identifiers
      # (user-managed repository assets); they are mapped into the FORGE_* env
      # namespace that the build scripts read (HICODEX_* env stays a legacy alias).
      - name: Check release updater and signing config
        run: npm run release:config --workspace @forge/desktop
        env:
          FORGE_UPDATER_ENDPOINTS: ${{ secrets.HICODEX_UPDATER_ENDPOINTS }}
          FORGE_UPDATER_PUBKEY: ${{ secrets.HICODEX_UPDATER_PUBKEY }}
          FORGE_UPDATER_PUBKEY_PATH: ${{ secrets.HICODEX_UPDATER_PUBKEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          FORGE_MACOS_SIGNING_IDENTITY: ${{ secrets.HICODEX_MACOS_SIGNING_IDENTITY }}
          FORGE_MACOS_ENTITLEMENTS: ${{ vars.HICODEX_MACOS_ENTITLEMENTS }}
          FORGE_MACOS_PROVIDER_SHORT_NAME: ${{ vars.HICODEX_MACOS_PROVIDER_SHORT_NAME }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVIDER_SHORT_NAME: ${{ vars.APPLE_PROVIDER_SHORT_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Build signed Tauri release
        run: npm run tauri:build:release --workspace @forge/desktop -- --target ${{ env.FORGE_RELEASE_TARGET }}
        env:
          FORGE_UPDATER_ENDPOINTS: ${{ secrets.HICODEX_UPDATER_ENDPOINTS }}
          FORGE_UPDATER_PUBKEY: ${{ secrets.HICODEX_UPDATER_PUBKEY }}
          FORGE_UPDATER_PUBKEY_PATH: ${{ secrets.HICODEX_UPDATER_PUBKEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          FORGE_MACOS_SIGNING_IDENTITY: ${{ secrets.HICODEX_MACOS_SIGNING_IDENTITY }}
          FORGE_MACOS_ENTITLEMENTS: ${{ vars.HICODEX_MACOS_ENTITLEMENTS }}
          FORGE_MACOS_PROVIDER_SHORT_NAME: ${{ vars.HICODEX_MACOS_PROVIDER_SHORT_NAME }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVIDER_SHORT_NAME: ${{ vars.APPLE_PROVIDER_SHORT_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Local releases (release.sh) verify codesign/staple/Gatekeeper after the
      # build; CI must be at least as strict — a release artifact that fails
      # Gatekeeper should fail the run, not reach users.
      - name: Verify signed artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          APPS=(
            target/${FORGE_RELEASE_TARGET}/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/${FORGE_RELEASE_TARGET}/release/bundle/macos/*.app
          )
          if [[ ${#APPS[@]} -eq 0 ]]; then
            echo "No signed .app bundle found for ${FORGE_RELEASE_TARGET}" >&2
            echo "Checked:" >&2
            echo "  target/${FORGE_RELEASE_TARGET}/release/bundle/macos/*.app" >&2
            echo "  apps/desktop/src-tauri/target/${FORGE_RELEASE_TARGET}/release/bundle/macos/*.app" >&2
            exit 1
          fi
          APP="${APPS[0]}"
          codesign --verify --deep --strict --verbose=2 "$APP"
          xcrun stapler validate "$APP"
          spctl --assess --type exec --verbose=2 "$APP"

      - name: Generate updater metadata
        # tauri:build:release runs with CWD=apps/desktop, so the release config
        # it writes lands under apps/desktop/.tmp — read it from there.
        run: node scripts/generate-tauri-update-metadata.mjs --config apps/desktop/.tmp/tauri.release.conf.json --target ${{ env.FORGE_RELEASE_TARGET }}
        env:
          FORGE_RELEASE_ARTIFACT_BASE_URL: ${{ secrets.HICODEX_RELEASE_ARTIFACT_BASE_URL }}
          FORGE_RELEASE_ARTIFACT_NAME: Forge

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-macos-release-${{ github.run_number }}
          if-no-files-found: error
          path: |
            target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/dmg/*.dmg
            target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/macos/*.app.tar.gz
            target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/macos/*.app.tar.gz.sig
            target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/macos/*.app.tar.gz.sig.*
            apps/desktop/src-tauri/target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/${{ env.FORGE_RELEASE_TARGET }}/release/bundle/macos/*.app.tar.gz.sig.*
            dist/release/**
