name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  script-compat:
    name: Script compatibility
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: npm ci

      - name: Test root scripts
        run: npm run test:scripts

      - name: Check TypeScript runtime cycles
        run: npm run lint:ts-cycles

      # Windows is a declared packaging target (nsis/msi) but cargo test/clippy
      # run on macOS only — `cargo check` here locks the #[cfg(windows)]
      # branches (CREATE_NO_WINDOW, codex.exe resolution, …) at compile level.
      - name: Check Rust workspace (Windows cfg branches)
        run: cargo check --workspace --all-targets

  verify:
    name: Verify
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Test root scripts
        run: npm run test:scripts

      - name: Test JavaScript workspaces
        run: npm run test --workspaces --if-present

      - name: Check Rust formatting
        run: npm run format:check

      - name: Lint workspace
        run: npm run lint

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Build desktop web assets
        run: npm run build --workspace @forge/desktop

      # Browser-level smoke in system Chrome (ships on the macOS runner). The
      # script boots/reuses the Vite DEV server — NOT the production bundle
      # built above, so packaging-only regressions (base path, asset
      # resolution, prod CSP, code-split lazy loads) are still only covered by
      # `vite build` succeeding. TODO: add a `vite preview` smoke over dist/.
      - name: Browser smoke (e2e)
        run: npm run test:e2e

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install npm dependency tree
        run: npm ci --ignore-scripts

      # Gate at critical until the known xlsx advisory is resolved: sheetjs
      # stopped publishing to the npm registry at 0.18.5, so the prototype-
      # pollution/ReDoS fix (0.19.3+/0.20.x) is only available from the vendor
      # CDN tarball — swapping the dependency source is a deliberate
      # supply-chain decision, not an auto-fix. Tighten to high afterwards.
      - name: Audit npm production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Audit Rust dependencies (advisories, licenses, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources
